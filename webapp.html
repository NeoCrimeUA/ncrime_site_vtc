<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoCrime Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Используем системные цвета темы Telegram для нативного вида */
        body {
            background-color: var(--tg-theme-bg-color, #181818);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="app-content" class="container">
        <h2>Синхронизация...</h2>
    </div>

    <script>
        // Инициализация Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Открываем приложение на весь экран

        const tgUser = tg.initDataUnsafe?.user;
        const contentDiv = document.getElementById('app-content');

        if (tgUser) {
            // Запрос к твоему API
            fetch('https://api.neocrime.space/tg_auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tg_id: tgUser.id })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'ok') {
                    // Отрисовка профиля при успешной авторизации
                    contentDiv.innerHTML = `
                        <h2>${data.nickname}</h2>
                        <p>Накатано: <b>${data.mileage} км</b></p>
                    `;
                } else {
                    // Если TG ID нет в базе
                    contentDiv.innerHTML = `
                        <h3>Аккаунт не привязан</h3>
                        <p>Пожалуйста, привяжи свой Telegram в Discord канале компании.</p>
                    `;
                }
            })
            .catch(err => {
                contentDiv.innerHTML = '<h3>Ошибка подключения к серверу API.</h3>';
            });
        } else {
            contentDiv.innerHTML = '<h3>Пожалуйста, открой приложение через Telegram.</h3>';
        }
    </script>
</body>
</html>
